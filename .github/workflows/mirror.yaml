on:
  workflow_dispatch:
    inputs:
      IMAGE_NAME: # ${{ github.event.inputs.IMAGE_NAME }}
        description: 'original image name'
        required: true
        default: 'centos/centos7' 
  push:
    branches:
      - main
         
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: "rancher/shell" ##
      TARGET_REGISTRY: "registry.cn-hangzhou.aliyuncs.com/waterfalls" 
      ARCH: "arm64"
      #TARGET_REGISTRY: "registry.cn-hangzhou.aliyuncs.com/schokolade"
      #ARCH: "amd64"
      IMAGE_TAG: "v0.7.0" ##
    steps:
      - name: Login to Docker Registry
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }} ${{ env.TARGET_REGISTRY }}
      - name: Pull, tag, and push Docker image
        run: |
          if [[ "${{ env.IMAGE_NAME }}" == */* ]]; then
            TARGET_REPOSITORY=$(echo "${{ env.IMAGE_NAME }}" | tr '/' '-')
          else
            TARGET_REPOSITORY="${{ env.IMAGE_NAME }}"
          fi
          
          docker pull --platform ${{ env.ARCH }} ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ${{ env.TARGET_REGISTRY }}/${TARGET_REPOSITORY}:${{ env.IMAGE_TAG }}
          docker push ${{ env.TARGET_REGISTRY }}/${TARGET_REPOSITORY}:${{ env.IMAGE_TAG }}